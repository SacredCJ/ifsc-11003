<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>
  <style type="text/css">
    /* ---------------Box Sizing----------------- */
    html {
      box-sizing: border-box;
    }
    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }
    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
      cursor: none;
    }
    #wrapper {
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 800px;
      margin-right: auto;
      margin-left: auto;
      text-shadow: 2px 2px #000;
      position: relative;
    }
    #navy, #teal, #blue, #aqua {
      position: absolute;
      width: 100px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #navy {
      background-color: #001f3f;
    }
    #teal {
      background-color: #39CCCC;
    }
    #blue {
      background-color: #0074D9;
    }
    #aqua {
      background-color: #7FDBFF;
    }
    #footer {
      background-color: #666;
    }
    h1 {
      color: #000;
      font-weight: normal;
      padding: 50px;
    }
    #duck {
      position: absolute;
      width: 50px;
      height: 50px;
      font-size: 50px;
      pointer-events: none;
      z-index: 1000;
    }
    #duck::before {
      content: "🦆";
    }
    .footprint {
      position: absolute;
      width: 20px;
      height: 20px;
      font-size: 20px;
      opacity: 0.5;
      pointer-events: none;
    }
    .footprint::before {
      content: "�";
    }
    .crumb {
      position: absolute;
      width: 10px;
      height: 10px;
      font-size: 10px;
      pointer-events: none;
    }
    .crumb::before {
      content: "🍞";
    }
    #win-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      color: #000;
      background: #FFF;
      padding: 20px;
      border: 2px solid #000;
      display: none;
      z-index: 2000;
    }
  </style>
</head>
<body>
  <h1>Exercise</h1>
  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
  <div id="duck"></div>
  <div id="win-message">YOU WON!</div>
  <script src="assets/javascript/scripts.js"></script>
</body>

</html>
